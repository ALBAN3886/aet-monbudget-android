plugins {
    id 'com.android.application'
}

android {
    namespace 'com.aet.monbudget'
    compileSdk 34

    defaultConfig {
        applicationId "com.aet.monbudget"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            signingConfig signingConfigs.release
        }
    }

    signingConfigs {
        release {
            storeFile file(System.getenv("KEYSTORE_PATH") ?: "../keystore/aet-release.jks")
            storePassword System.getenv("KEYSTORE_PASSWORD") ?: "aetmonbudget2026"
            keyAlias System.getenv("KEY_ALIAS") ?: "aetmonbudget"
            keyPassword System.getenv("KEY_PASSWORD") ?: "aetmonbudget2026"
        }
    }

    buildFeatures {
        viewBinding false
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.7.0'
    implementation 'androidx.core:core:1.13.1'
    implementation 'androidx.swiperefreshlayout:swiperefreshlayout:1.1.0'
}
